<!DOCTYPE html>
<html lang="es">
  <head>
		<title>Intranet</title>
		<meta charset="UTF-8">
		<script src="https://kit.fontawesome.com/5e64ddfdb3.js" crossorigin="anonymous"></script>
		<link href="https://fonts.googleapis.com/css2?family=Signika:wght@300..700&display=swap" rel="stylesheet">
		<meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, viewport-fit=cover">
		<link href="style/style.css" rel="stylesheet" type="text/css" >
		<meta name="description" content="Intranet">
		<meta name="keywords" content="Intranet, Musicfy">
		<meta name="author" content="Vanessa Klie, Javier Gaston, Daniel Caballero, Ekaitz, Lucian Stelian Grecianu">
	
		<!-- JavaScript -->
		<script src="script/script.js" defer></script>
  </head>
  
  <!-- Body -->
  <body>
  
	<!-- Encabezado de la página -->
	<header>
		<div class="contenedorHeader">
			<div id="menuHeader">
				<!-- Menu -->
				<button id="buttonMenu">
					<i class="fa-solid fa-bars"> </i>
				</button>
				
			</div>
			<div class="imagenLOGO">
				<!-- imagenLOGO -->
				<img src="img/destruye.png" alt="Logo Musicfy" id="logo" height="90%" width="20%">
				<!-- Título 1 -->
				<h1>Destruye MP3</h1>
			</div>
		</div>
	</header>
	
	
	
	<!-- Sección principal del documento -->
	<section>
		<div class="contenedor">
			
				<!--Formulario de login-->
				<form class="formularioPersonal" action="#" method="post">
					<h2>Registro personal</h2>
					<div class="input-contenedor">
						<!--<label for="email">email</label>-->
						<label for="nombre">Nombre</label>
						<input id="nombre" type="text" name="nombre" required> 
						
					</div>
					<div class="input-contenedor">
						<!--<label for="pass">password</label>-->
						<label for="apellido">Apellido</label>
						<input id="apellido" type="text" name="apellido" required> 
					</div>
					<div class="input-contenedor">
						<!--<label for="email">email</label>-->
						<label for="dni">DNI</label>
						<input id="dni" type="text" name="dni" required> 
					</div>
                    <div class="input-contenedor">
						<!--<label for="email">email</label>-->
						<i class="fa-solid fa-envelope"></i>
						<label for="correo">Email</label>
						<input id="correo" type="email" name="email" required> 
					</div>
                    <div>
						<button class="buttonLogin" type="submit">Registrar</button>
					</div>
				</form>		
			
		</div>
		
	</section>
	
	<!-- Pie de página -->
	<footer>
	<!-- Creative Comons -->
      <p class="licencia">&copy;
        <span property="dct:title">2026</span>
        <span property="cc:attributionName">Destruye MP3</span>
        <a>Todos los derechos reservados </a>
      </p>
	</footer>
  
  </body>
  
</html>
